name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: '0 6 * * *'

# Grant the workflow permission to write to Github pages
permissions:
    contents: read
    pages: write
    id-token: write

# only one Pages deployment at a time
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    # Job 1: Run tests and generate report
    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            
            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run tests (headless)
              run: HEADLESS=true npx codeceptjs run --steps
              continue-on-error: true

            - name: Get previous Allure history
              uses: actions/checkout@v4
              if: always()
              continue-on-error: true
              with:
                ref: gh-pages
                path: gh-pages

            - name: Copy previous history
              if: always()
              run: |
                mkdir -p output/allure-results/history
                cp -r gh-pages/history/* output/allure-results/history/ 2>/dev/null || true

            - name: Generate Allure report
              if: always()
              run: npx allure generate output/allure-results --clean -o output/allure-report

            - name: Upload test report as artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: allure-report
                path: output/allure-report
                retention-days: 30

            - name: Upload failure screenshots
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: failure-screenshots
                path: output/*.png
                retention-days: 7
    
    # Job 2: Deploy report to Github Pages
    deploy-report:
        needs: e2e-tests
        if: always() && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Download Allure report artifact
              uses: actions/download-artifact@v4
              with:
                name: allure-report
                path: allure-report

            - name: Setup GitHub Pages
              uses: actions/configure-pages@v5

            - name: Upload to GitHub Pages
              uses: actions/upload-pages-artifact@v3
              with:
                path: allure-report

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4