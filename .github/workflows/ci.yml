name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: '0 23 * * *'

# Grant the workflow permission to write to Github pages
permissions:
    contents: write

# only one Pages deployment at a time
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    # Job 1: Run tests and generate report
    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            
            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: |
                for i in 1 2 3; do
                  sudo apt-get update && npx playwright install chromium --with-deps && break
                  echo "Attempt $i failed, retrying in 15s..."
                  sleep 15
                done

            - name: Run tests (headless)
              run: HEADLESS=true npx codeceptjs run --steps 2>&1 | tee output/test-output.log
              continue-on-error: true

            - name: Extract test stats
              run: |
                sed 's/\x1b\[[0-9;]*m//g' output/test-output.log > output/test-clean.log
                cat output/test-clean.log | tail -20
                PASSED=$(grep -oE '[0-9]+ passed' output/test-clean.log | head -1 | grep -oE '[0-9]+' || echo "0")
                FAILED=$(grep -oE '[0-9]+ failed' output/test-clean.log | head -1 | grep -oE '[0-9]+' || echo "0")
                SKIPPED=$(grep -oE '[0-9]+ skipped' output/test-clean.log | head -1 | grep -oE '[0-9]+' || echo "0")
                TOTAL=$((PASSED + FAILED + SKIPPED))
                echo "{\"passed\": $PASSED, \"failed\": $FAILED, \"skipped\": $SKIPPED, \"total\": $TOTAL}" > output/stats.json
                echo "Stats: $(cat output/stats.json)"

            - name: Get today's date
              id: date
              run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

            - name: Checkout existing gh-pages content
              uses: actions/checkout@v4
              continue-on-error: true
              with:
                ref: gh-pages
                path: gh-pages-content

            - name: Create gh-pages folder if first run
              run: mkdir -p gh-pages-content/reports

            - name: Copy today's report into dated folder
              run: |
                mkdir -p gh-pages-content/reports/${{ steps.date.outputs.date }}
                if [ -d output/html-report ]; then
                  cp -r output/html-report/. gh-pages-content/reports/${{ steps.date.outputs.date }}/
                elif [ -f output/report.html ]; then
                  cp output/report.html gh-pages-content/reports/${{ steps.date.outputs.date }}/index.html
                else
                  echo "No report found — tests may have crashed before reporter ran"
                fi
                cp output/stats.json gh-pages-content/reports/${{ steps.date.outputs.date }}/stats.json


            - name: Generate manifest.json
              run: |
                echo "[" > gh-pages-content/manifest.json
                first=true
                for dir in $(ls -dr gh-pages-content/reports/*/); do
                  d=$(basename "$dir")
                  if [ -f "$dir/stats.json" ]; then
                    if [ "$first" = true ]; then first=false; else echo "," >> gh-pages-content/manifest.json; fi
                    P=$(grep -oE '"passed": [0-9]+' "$dir/stats.json" | grep -oE '[0-9]+')
                    F=$(grep -oE '"failed": [0-9]+' "$dir/stats.json" | grep -oE '[0-9]+')
                    S=$(grep -oE '"skipped": [0-9]+' "$dir/stats.json" | grep -oE '[0-9]+')
                    T=$((P + F + S))
                    echo "{\"date\":\"$d\",\"passed\":$P,\"failed\":$F,\"skipped\":$S,\"total\":$T}" >> gh-pages-content/manifest.json
                  fi
                done
                echo "]" >> gh-pages-content/manifest.json
                cat gh-pages-content/manifest.json

            - name: Copy dashboard HTML
              run: cp dashboard/index.html gh-pages-content/index.html

            - name: Deploy to GitHub Pages (gh-pages branch)
              uses: peaceiris/actions-gh-pages@v4
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: gh-pages-content
                user_name: 'github-actions[bot]'
                user_email: 'github-actions[bot]@users.noreply.github.com'

            - name: Upload failure screenshots
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: failure-screenshots
                path: output/*.png
                retention-days: 7