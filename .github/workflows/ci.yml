name: E2E Tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    schedule:
        - cron: '0 23 * * *'

# Grant the workflow permission to write to Github pages
permissions:
    contents: write

# only one Pages deployment at a time
concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    # Job 1: Run tests and generate report
    e2e-tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
                cache: 'npm'
            
            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install chromium --with-deps

            - name: Run tests (headless)
              run: HEADLESS=true npx codeceptjs run --steps
              continue-on-error: true

            - name: Get today's date
              id: date
              run: echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT

            - name: Checkout existing gh-pages content
              uses: actions/checkout@v4
              continue-on-error: true
              with:
                ref: gh-pages
                path: gh-pages-content

            - name: Create gh-pages folder if first run
              run: mkdir -p gh-pages-content/reports

            - name: Copy today's report into dated folder
              run: |
                mkdir -p gh-pages-content/reports/${{ steps.date.outputs.date }}
                cp -r output/html-report/* gh-pages-content/reports/${{ steps.date.outputs.date }}/

            - name: Generate root index.html
              run: |
                cat > gh-pages-content/index.html << 'EOF'
                <!DOCTYPE html>
                <html lang="en">
                <head>
                  <meta charset="UTF-8">
                  <title>QA Utils - Test Reports</title>
                  <style>
                    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
                    h1 { color: #1a1a2e; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; }
                    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
                    th { background: #1a1a2e; color: white; padding: 14px 16px; text-align: left; }
                    td { padding: 12px 16px; border-bottom: 1px solid #eee; }
                    tr:last-child td { border-bottom: none; }
                    tr:hover td { background: #f0f4ff; }
                    a { color: #0969da; text-decoration: none; font-weight: 500; }
                    a:hover { text-decoration: underline; }
                    .badge { background: #0969da; color: white; padding: 3px 10px; border-radius: 12px; font-size: 12px; }
                  </style>
                </head>
                <body>
                  <h1>🧪 QA Utils — Daily Test Reports</h1>
                  <table>
                    <thead><tr><th>#</th><th>Date</th><th>Report</th></tr></thead>
                    <tbody>
                EOF
      
                count=1
                for dir in $(ls -dr gh-pages-content/reports/*/); do
                  date=$(basename "$dir")
                  echo "      <tr><td>$count</td><td>$date</td><td><a href=\"reports/$date/index.html\"><span class=\"badge\">View Report</span></a></td></tr>" >> gh-pages-content/index.html
                  count=$((count + 1))
                done
      
                cat >> gh-pages-content/index.html << 'EOF'
                    </tbody>
                  </table>
                </body>
                </html>
                EOF

            - name: Deploy to GitHub Pages (gh-pages branch)
              uses: peaceiris/actions-gh-pages@v4
              with:
                github_token: ${{ secrets.GITHUB_TOKEN }}
                publish_dir: gh-pages-content
                user_name: 'github-actions[bot]'
                user_email: 'github-actions[bot]@users.noreply.github.com'

            - name: Upload failure screenshots
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: failure-screenshots
                path: output/*.png
                retention-days: 7